<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ben 10 Lore Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

a{
text-decoration:none;
color:white;
}

img{
max-width:100%;
display:block;
}

.header-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.topbar{
max-width:1400px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
width:280px;
height:auto;
}

.logo-text h1{
color:#22ff55;
font-size:42px;
}

.logo-text p{
color:#cccccc;
font-size:16px;
}

nav{
display:flex;
gap:30px;
flex-wrap:wrap;
}

nav a{
font-weight:bold;
transition:0.3s;
padding:5px 0;
border-bottom:2px solid transparent;
}

nav a:hover, nav a.active{
color:#22ff55;
border-bottom:2px solid #22ff55;
}

.hero{
height:700px;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
url("Cover Photo.png");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero-content{
max-width:900px;
}

.hero h2{
font-size:clamp(40px,7vw,90px);
line-height:1.1;
margin-bottom:20px;
}

.green{
color:#22ff55;
}

.hero p{
font-size:24px;
color:#ddd;
margin-bottom:30px;
}

.search-box{
width:100%;
max-width:700px;
padding:18px;
font-size:20px;
border-radius:50px;
border:2px solid #22ff55;
background:#111;
color:white;
outline:none;
}

.search-box:focus{
box-shadow:0 0 15px rgba(34,255,85,.6);
}

#searchMessage{
margin-top:20px;
color:#ccc;
font-size:16px;
display:none;
}

.section{
max-width:1400px;
margin:auto;
padding:60px 20px;
}

.section-title{
font-size:36px;
color:#22ff55;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#111;
border:1px solid #22ff55;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #22ff55;
}

.card.villain-card{
border-color:#ff3b4e;
}

.card.villain-card:hover{
box-shadow:0 0 20px #ff3b4e;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
background:#1a1a1a;
}

.card-content{
padding:15px;
}

.card-content h3{
margin-bottom:10px;
}

.villain-card .card-content h3{
color:#ff3b4e;
}

.badge{
display:inline-block;
background:#22ff55;
color:#000;
font-size:12px;
font-weight:bold;
padding:3px 10px;
border-radius:20px;
margin-bottom:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.stat-box{
background:#111;
border:1px solid #22ff55;
padding:30px;
text-align:center;
border-radius:15px;
}

.stat-box h2{
font-size:40px;
color:#22ff55;
margin-bottom:10px;
}

.omnitrix-grid{
display:grid;
grid-template-columns:280px 1fr;
gap:40px;
align-items:center;
background:#111;
border:1px solid #22ff55;
border-radius:15px;
padding:30px;
}

.omnitrix-grid img{
border-radius:15px;
}

.omnitrix-grid ul{
list-style:none;
margin-top:15px;
}

.omnitrix-grid li{
margin-bottom:12px;
padding-left:22px;
position:relative;
color:#ddd;
}

.omnitrix-grid li::before{
content:"⬡";
color:#22ff55;
position:absolute;
left:0;
}

.about-box{
background:#111;
border:1px solid #22ff55;
border-radius:15px;
padding:30px;
color:#ccc;
line-height:1.7;
}

.about-box a{
color:#22ff55;
font-weight:bold;
}

footer{
background:#07132b;
padding:50px 20px;
margin-top:60px;
border-top:3px solid #22ff55;
}

.footer-grid{
max-width:1400px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.footer-grid h3{
color:#22ff55;
margin-bottom:15px;
}

.footer-grid p, .footer-grid a{
margin-bottom:10px;
color:#ccc;
display:block;
transition:.3s;
}

.footer-grid a:hover{
color:#22ff55;
}

@media(max-width:768px){

.topbar{
justify-content:center;
text-align:center;
}

.logo{
flex-direction:column;
text-align:center;
}

.logo{
gap:8px;
}

.logo img{
width:300px;
height:auto;
}

.logo-text h1{
font-size:36px;
}

.logo-text p{
font-size:15px;
}

nav{
justify-content:center;
}

.hero{
height:600px;
}

.hero h2{
font-size:50px;
}

.hero p{
font-size:18px;
}

.search-box{
font-size:16px;
}

.omnitrix-grid{
grid-template-columns:1fr;
text-align:center;
}

.omnitrix-grid img{
margin:auto;
max-width:220px;
}

.omnitrix-grid li{
text-align:left;
}

}

</style>
</head>
